<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- order list type numbers  -->
    <ol type="1">
        <li>Apple</li>
        <li>orange</li>
        <li>mango</li>
        <li>jamun</li>
        <li>banana</li>
    </ol>

    <!-- order list type alphabets -->
    <ol type="A" start="520">
        <li>Kaju katli</li>
        <li>gulab jamun</li>
        <li>modak</li>
        <li>jalebi</li>
    </ol>
    <!-- order list but in reverse   -->
    <ol start="6" reversed>
        <li>purna poli</li>
        <li>samosa</li>
        <li>pettis</li>
        <li>dhokla</li>
    </ol>
    <!-- unorder list  -->
    <ul>
        <li>GT650</li>
        <li>Classic 350</li>
    </ul>
   <!-- unorder list type sircle  -->
    <ul type="circle">
        <li>Speed 400</li>
        <li>Ducati</li>
        <li>Jawa</li>
    </ul>
</body>
</html>
